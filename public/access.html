<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Page</title>
    <link rel="stylesheet" href="access.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-xxl-4 col-sm-1 col-md-2"></div>
            <div class="col-xxl-4 col-sm-10 col-md-8" id="main">
                <div id="logo">
                    <div class="logo rounded-circle">
                        <i class="bi bi-whatsapp fs-1"></i>
                    </div>
                    <h2>Fictitious Enterprise</h2>
                    <p>Chat with your coworkers!</p>
                </div>
                <div id="form" class="shadow rounded-3">
                    <div class="greeting">
                        <h3>Welcome Back!</h3>
                        <p>Access Your Account By Logging In</p>
                    </div>
                    <div id="form-info">
                        <div class="email">
                            <p><strong>Email</strong></p>
                            <input type="text" class="form-control" placeholder="example@gmail.com">
                        </div>
                        <div class="password">
                            <p><strong>Password</strong></p>
                            <input type="text" class="form-control" placeholder="Type Your Password...">
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-primary" type="button">Log In</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xxl-4 col-sm-1 col-md-2"></div>
        </div>
        
    </div>





    <script src="access.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
